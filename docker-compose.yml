version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: gunbound_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - gunbound_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: gunbound_redis
    ports:
      - "6379:6379"
    networks:
      - gunbound_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    image: ${DOCKER_USERNAME:-alvaroMarcani}/gunbound-backend:latest
    container_name: gunbound_backend
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 5000
      ConnectionStrings__PostgreSQL: "Host=postgres;Port=5432;Database=gunbound_db;Username=gunbound_user;Password=GunBound123!@#"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gunbound_network

  # Frontend
  frontend:
    image: ${DOCKER_USERNAME:-alvaroMarcani}/gunbound-frontend:latest
    container_name: gunbound_frontend
    ports:
      - "4200:4200"
    environment:
      ANGULAR_CLI_ANALYTICS: false
    networks:
      - gunbound_network

  # pgAdmin - PostgreSQL Administration Tool
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gunbound_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gunbound.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gunbound_network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:

networks:
  gunbound_network:
    driver: bridge
